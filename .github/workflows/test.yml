name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: watermemo_test
          POSTGRES_USER: watermemo
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U watermemo -d watermemo_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      SECRET_KEY: test-secret-key
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
      DB_NAME: watermemo_test
      DB_USER: watermemo
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: "5432"
      LLM_BASE_URL: http://localhost:11434/v1
      LLM_API_KEY: ollama
      LLM_MODEL: test-model
      LLM_EMBEDDING_MODEL: test-embed

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --dev

      - name: Run migrations
        run: uv run python manage.py migrate --noinput

      - name: Run tests
        run: uv run pytest --tb=short -q
