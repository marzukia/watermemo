<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MemorAI Debug</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 24px;
      border-bottom: 1px solid #2a2a2a;
      font-size: 0.85rem;
      color: #666;
      display: flex;
      gap: 16px;
      align-items: center;
    }
    header strong { color: #fff; font-size: 1rem; }

    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      flex: 1;
      overflow: hidden;
    }

    .panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid #2a2a2a;
      overflow: hidden;
    }
    .panel:last-child { border-right: none; }

    .panel-header {
      padding: 12px 20px;
      border-bottom: 1px solid #2a2a2a;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
    }

    .feed {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.88rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user  { align-self: flex-end; background: #1a3a5c; color: #cce0ff; border-bottom-right-radius: 3px; }
    .msg.ai    { align-self: flex-start; background: #1e1e1e; color: #ddd; border: 1px solid #2e2e2e; border-bottom-left-radius: 3px; }
    .msg.error { align-self: flex-start; background: #3a1a1a; color: #f88; border: 1px solid #5a2a2a; }
    .msg.info  { align-self: flex-start; background: #1a2a1a; color: #8d8; border: 1px solid #2a3a2a; font-size: 0.8rem; }

    .context-block {
      align-self: flex-start;
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.78rem;
      color: #888;
      max-width: 90%;
    }
    .context-block summary { cursor: pointer; color: #aaa; margin-bottom: 4px; }
    .context-item { margin-top: 8px; padding-top: 8px; border-top: 1px solid #2a2a2a; }
    .context-item .label { color: #666; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; }
    .context-item .value { color: #bbb; margin-top: 2px; }

    .input-row {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #2a2a2a;
      background: #0f0f0f;
    }

    textarea {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 0.88rem;
      padding: 10px 12px;
      resize: none;
      min-height: 44px;
      max-height: 160px;
      font-family: inherit;
      line-height: 1.4;
      overflow-y: auto;
    }
    textarea:focus { outline: none; border-color: #555; }

    button {
      padding: 0 18px;
      background: #1a3a5c;
      border: none;
      border-radius: 8px;
      color: #cce0ff;
      font-size: 0.85rem;
      cursor: pointer;
      white-space: nowrap;
      align-self: flex-end;
      height: 44px;
    }
    button:hover { background: #1e4570; }
    button:disabled { opacity: 0.4; cursor: default; }

    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid #444;
      border-top-color: #aaa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <strong>MemorAI</strong>
  <span>debug console</span>
</header>

<div class="panels">

  <!-- STORE PANEL -->
  <div class="panel" id="store-panel">
    <div class="panel-header">Store Memory</div>
    <div class="feed" id="store-feed"></div>
    <div class="input-row">
      <textarea id="store-input" placeholder="Enter memory content…" rows="2"></textarea>
      <button id="store-btn" onclick="storeMemory()">Store</button>
    </div>
  </div>

  <!-- RECALL PANEL -->
  <div class="panel" id="recall-panel">
    <div class="panel-header">Recall</div>
    <div class="feed" id="recall-feed"></div>
    <div class="input-row">
      <textarea id="recall-input" placeholder="Ask a question…" rows="2"></textarea>
      <button id="recall-btn" onclick="recallMemory()">Ask</button>
    </div>
  </div>

</div>

<script>
  function appendMsg(feedId, text, type = "ai") {
    const feed = document.getElementById(feedId);
    const div = document.createElement("div");
    div.className = `msg ${type}`;
    div.textContent = text;
    feed.appendChild(div);
    feed.scrollTop = feed.scrollHeight;
    return div;
  }

  function appendContext(feedId, contextItems) {
    if (!contextItems || contextItems.length === 0) return;
    const feed = document.getElementById(feedId);
    const details = document.createElement("details");
    details.className = "context-block";
    const summary = document.createElement("summary");
    summary.textContent = `${contextItems.length} memory context${contextItems.length > 1 ? "s" : ""} used`;
    details.appendChild(summary);
    contextItems.forEach((item, i) => {
      const block = document.createElement("div");
      block.className = "context-item";
      block.innerHTML = `
        <div class="label">Memory #${item.id} &mdash; distance ${item.distance?.toFixed(4) ?? "?"}</div>
        <div class="value"><strong>Summary:</strong> ${item.distillation}</div>
        <div class="value" style="margin-top:4px; color:#777"><strong>Full:</strong> ${item.content}</div>
      `;
      details.appendChild(block);
    });
    feed.appendChild(details);
    feed.scrollTop = feed.scrollHeight;
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading ? '<span class="spinner"></span>' : btn.dataset.label;
  }

  document.getElementById("store-btn").dataset.label = "Store";
  document.getElementById("recall-btn").dataset.label = "Ask";

  // Submit on Ctrl+Enter / Cmd+Enter
  document.getElementById("store-input").addEventListener("keydown", e => {
    if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) storeMemory();
  });
  document.getElementById("recall-input").addEventListener("keydown", e => {
    if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) recallMemory();
  });

  async function storeMemory() {
    const input = document.getElementById("store-input");
    const content = input.value.trim();
    if (!content) return;

    appendMsg("store-feed", content, "user");
    input.value = "";
    setLoading("store-btn", true);

    try {
      const res = await fetch("/api/memories/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || JSON.stringify(data));
      appendMsg("store-feed", `Stored as Memory #${data.id}`, "info");
    } catch (err) {
      appendMsg("store-feed", `Error: ${err.message}`, "error");
    } finally {
      setLoading("store-btn", false);
    }
  }

  async function recallMemory() {
    const input = document.getElementById("recall-input");
    const query = input.value.trim();
    if (!query) return;

    const feed = document.getElementById("recall-feed");
    appendMsg("recall-feed", query, "user");
    input.value = "";
    setLoading("recall-btn", true);

    // Placeholder message that we'll stream tokens into
    const answerDiv = document.createElement("div");
    answerDiv.className = "msg ai";
    feed.appendChild(answerDiv);

    try {
      const res = await fetch("/api/recall/stream", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query }),
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || JSON.stringify(err));
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop(); // hold incomplete line

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const event = JSON.parse(line.slice(6));
          if (event.type === "token") {
            answerDiv.textContent += event.data;
            feed.scrollTop = feed.scrollHeight;
          } else if (event.type === "context") {
            appendContext("recall-feed", event.data);
          }
        }
      }
    } catch (err) {
      answerDiv.remove();
      appendMsg("recall-feed", `Error: ${err.message}`, "error");
    } finally {
      setLoading("recall-btn", false);
    }
  }
</script>

</body>
</html>
